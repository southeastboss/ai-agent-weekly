name: Daily AI Agent News Update

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:
  push:
    branches:
      - master

concurrency:
  group: ai-agent-weekly-update
  cancel-in-progress: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}

jobs:
  update-news:
    name: Scrape and Update
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Download vendor logos
        run: |
          mkdir -p assets/vendor-logos
          # Google logo (already committed, redownload for safety)
          curl -sL --max-time 30 "https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_272x92dp.png" -o assets/vendor-logos/google.png
          # OpenAI logo from GitHub raw
          curl -sL --max-time 30 "https://raw.githubusercontent.com/openai/whisper/main/openai-logo.svg" -o assets/vendor-logos/openai.png || \
          curl -sL --max-time 30 "https://cdn.openai.com/logo/logo-mark.png" -o assets/vendor-logos/openai.png || \
          curl -sL --max-time 30 "https://www.google.com/s2/favicons?domain=openai.com&sz=512" -o assets/vendor-logos/openai.png
          # Anthropic logo
          curl -sL --max-time 30 "https://platform.claude.com/docs/images/anthropic-logo.png" -o assets/vendor-logos/anthropic.png || \
          curl -sL --max-time 30 "https://www.google.com/s2/favicons?domain=anthropic.com&sz=512" -o assets/vendor-logos/anthropic.png
          echo "Downloaded logos:"
          ls -lh assets/vendor-logos/

      - name: Install dependencies
        run: npm ci

      - name: Run scraper
        run: |
          git pull --rebase origin master || true
          npm run scrape

      - name: Smoke check generated HTML
        run: npm run smoke-check

      - name: Commit and push
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html assets/vendor-logos/
          git commit -m "auto-update: $(date +'%Y-%m-%d')" || true
          git push || true
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: generated-html
          path: index.html
          retention-days: 7

      - name: Notify on failure
        if: failure()
        run: |
          curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=❌ ai-agent-weekly 更新失败！" \
            || true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Notify on success
        if: success()
        run: |
          curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=✅ ai-agent-weekly 更新成功 $(date +'%Y-%m-%d %H:%M')" \
            || true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
